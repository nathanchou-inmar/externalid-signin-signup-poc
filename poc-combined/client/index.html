<html>
<head>
    <meta name="viewport"
          content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=yes" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="HandheldFriendly" content="true" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
          rel="stylesheet" />
    <link rel="icon" type="image/png" sizes="32x32" href="https://qahcplatformstorage.blob.core.windows.net/assets/inmar_logo.png">
    <style>
        :root {
            --aura-size-start: 0rem;
            --aura-size-mid: 75rem;
            --aura-size-end: 58.25rem;
        }

        @media screen and (min-width: 1280px) {
            :root {
                --aura-size-start: 0rem;
                --aura-size-mid: 94.125rem;
                --aura-size-end: 73.125rem;
            }
        }

        @media screen and (min-width: 1536px) {
            :root {
                --aura-size-start: 0rem;
                --aura-size-mid: 110.75rem;
                --aura-size-end: 86.125rem;
            }
        }

        * {
            font-feature-settings: "kern";
            font-kerning: normal;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html {
            height: 100%;

            * {
                box-sizing: border-box;
            }
        }

        body {
            font-family: Inter !important;
            background: #fefefe !important;
            margin: 0rem !important;
            height: 100vh;
            position: relative;
            overflow: hidden;

            * {
                font-family: Inter;
            }
        }

        footer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 1rem 4rem;

            @media screen and (min-width: 80rem) {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
        }

            footer a,
            footer p {
                margin: 0;
                font-size: 0.875rem;
                font-style: normal;
                font-weight: 400;
                line-height: 140%;
                color: #65666c;
                text-underline-offset: 1px;
            }

                footer a:hover,
                footer a:active {
                    color: #0005f8;
                }

                footer a:focus-visible {
                    outline: 2px solid #6f72ff;
                    outline-offset: 2px;
                    border-radius: 0.375rem;
                }

        .footer-left-container,
        .footer-right-container {
            display: flex;
            gap: 1.25rem;

            @media screen and (min-width: 768px) {
                gap: 2.5rem;
            }
        }

        .container {
            position: relative;
            width: 100%;
            height: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container.has-alert {
            justify-content: flex-start;
            padding-top: var(--alert-clearance, 0);
        }

            .container.has-alert .form-wrapper {
                margin-top: 1rem !important;
            }

        @keyframes auraAnimation {
            0% {
                width: var(--aura-size-start);
                height: var(--aura-size-start);
                border-radius: var(--aura-size-start);
            }

            70% {
                width: var(--aura-size-mid);
                height: var(--aura-size-mid);
                border-radius: var(--aura-size-mid);
                background: radial-gradient( 50% 50% at 50% 50%, rgba(254, 252, 255, 0.4) 0%, rgba(176, 177, 247, 0.4) 70%, rgba(254, 252, 255, 0.4) 100% );
            }

            100% {
                width: var(--aura-size-end);
                height: var(--aura-size-end);
                border-radius: var(--aura-size-end);
                background: radial-gradient( 50% 50% at 50% 50%, rgba(254, 252, 255, 0.4) 0%, rgba(176, 177, 247, 0.4) 70%, rgba(254, 252, 255, 0.4) 100% );
            }
        }

        .background-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            pointer-events: none;
        }

        .background-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            contain: strict;
            animation: auraAnimation 2s ease-in-out forwards;
            transition: all 2s ease-in-out;
        }

        .content-wrapper {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            position: absolute;
            top: 0;
            left: 0;
        }

        @keyframes slideUpAnimation {
            0% {
                opacity: 0;
                transform: translate(0, 20%);
            }

            70% {
                opacity: 0;
                transform: translate(0, 10%);
            }

            100% {
                opacity: 1;
                transform: translate(0, 0);
            }
        }

        .form-wrapper {
            margin-top: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 21.5rem;
            opacity: 0;
            animation: slideUpAnimation 2.5s ease-in-out forwards;

            @media screen and (min-width: 1280px) {
                width: 20.5rem;
            }

            @media screen and (min-width: 1536px) {
                width: 24rem;
            }
        }

        .logo,
        #dividedLogo {
            width: 2rem;
            height: 2rem;
            margin-bottom: 1.5rem;
        }

        #api {
            width: 100%;
        }

        .description {
            color: #65666c;
            text-align: center;
            font-size: 0.875rem;
            font-style: normal;
            font-weight: 400;
            line-height: 140%;
            margin: 0.5rem 0 2.5rem 0;
        }

        .entry {
            display: flex;
            flex-direction: column;
        }

        .entry-item {
            position: relative;
            margin-bottom: 2.5rem;
        }

        .showPassword {
            background-color: transparent;
            padding: 0;
            position: absolute;
            right: 1rem;
            bottom: 1.3rem;
            margin: 0;
            width: 1.5rem;
            height: 1.5rem;

            &:hover,
            &:focus-visible {
                background-color: transparent;
            }
        }

        label {
            color: #2c2c2e;
            font-size: 1rem;
            font-style: normal;
            font-weight: 400;
            line-height: 115%;
        }

        input {
            width: 100%;
            display: flex;
            min-height: 4rem;
            padding: 0.875rem 1rem;
            align-items: center;
            gap: 0.625rem;
            align-self: stretch;
            border-radius: 0.5rem;
            border: 1px solid #8f9296;
            background: #fff;
            margin-top: 0.5rem;
            color: #2c2c2e;
            font-size: 1rem;
            font-weight: 400;
            line-height: 140%;
        }

            input:disabled {
                border-radius: 0.5rem;
                border: 1px solid #ecebe4;
                background: #f8f8f8;
            }

            input:focus-visible {
                outline: none;
                border: 1px solid #0004cb;
            }

        button {
            display: flex;
            width: 13.625rem;
            padding: 0.75rem 1rem;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            border-radius: 0.5rem;
            background: #fff;
            color: #0005f8;
            font-size: 1rem;
            font-weight: 600;
            line-height: 150%;
            letter-spacing: -0.01rem;
            border: none;
            cursor: pointer;

            @media screen and (min-width: 1280px) {
                width: 14.875rem;
            }

            @media screen and (min-width: 1536px) {
                width: 17.5rem;
            }

            &:hover {
                opacity: 1;
                background-color: hsla(239, 45%, 40%, 1);
                color: white;
            }

            &:focus-visible {
                background-color: #0005f8;
                color: white;
                outline: 2px solid #6f72ff;
                outline-offset: 1px;
            }
        }

        #next {
            justify-self: center;
        }

        .text-link-group,
        .linkContainer {
            width: 100%;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
            margin-top: 1rem;
        }

            .text-link-group a,
            .resend-code-btn,
            .backToSignInLink {
                padding-block: 0.375rem;
                color: #2c2c2e;
                text-align: center;
                font-size: 0.875rem;
                font-weight: 600;
                line-height: 150%;
                letter-spacing: -0.00875rem;
                text-decoration: none;
                opacity: 1 !important;

                &:hover {
                    text-decoration: underline;
                    text-decoration-color: #0005f8;
                    text-decoration-thickness: 2px;
                    text-underline-offset: 2px;
                }

                &:focus-visible {
                    border-radius: 0.5rem;
                    outline: 2px solid #6f72ff;
                }

                &:active {
                    color: #0005f8;
                }
            }

        .btn {
            background: #fff;
            padding: 5px;
            width: 150px;
            height: 35px;
            border: 1px solid #ff4081;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 50px #ff4081 inset;
            color: #fff;
        }

            .btn:hover {
                box-shadow: 0 0 #ff4081 inset;
                color: #ff4081;
            }

            .btn:focus {
                outline: none;
            }

        .attrEntry {
            position: relative;
            margin-left: -40px;
        }

        li {
            list-style: none;
        }

        #continue:disabled {
            opacity: 0.5;
        }

            #continue:disabled:hover {
                cursor: not-allowed;
                opacity: 0.5;
            }

        #continue {
            margin-right: 55px;
        }

        #cancel {
            border-radius: 0.5rem;
            border: 1px solid #0005f8;
            background-color: transparent;
            color: #161bff;

            &:focus-visible,
            &:hover {
                outline: 2px solid #6f72ff;
                outline-offset: 0;
            }
        }

        .helpLink {
            display: none;
        }

        .tdDivider {
            padding-left: 20px;
            border-left: 3px solid gray;
        }

        .intro {
            color: #2c2c2e;
            text-align: center;
        }

        h2, .heading-xl {
            font-size: 2.5rem;
            font-style: normal;
            font-weight: 300;
            line-height: 115%;
            letter-spacing: -0.02em;
            color: #2d2d2f;
            margin: 0;
        }

        #fieldIncorrect {
            display: none !important;
        }

        .error {
            color: #7f0d03;
            font-size: 14px;
            font-weight: 400;
            line-height: 140%;
        }

        #emailVerificationControl_but_change_claims,
        #passwordResetEmailVerificationControl_but_change_claims {
            display: none !important;
        }

        #emailVerificationControl input#email,
        #passwordResetEmailVerificationControl input#email {
            pointer-events: none;
            border-radius: 0.5rem;
            border: 0.0625rem solid #cfd5d4;
            background: #f8f8f8;
            cursor: not-allowed;
            opacity: 0.7;
            margin-bottom: 2.5rem;
        }

        #emailVerificationControl_but_send_code,
        #passwordResetEmailVerificationControl_but_send_code {
            width: 17.5rem;
            margin-bottom: 1rem;
        }

        .migrationAdditionalInfo {
            margin-block: 0.5rem 2.5rem !important;
        }

        #verifying_blurb {
            display: none;
        }

        .loginTitle {
            background-color: transparent;
            display: flex;
            padding-left: 0.5rem;
            padding-right: 1rem;
            position: relative;
            align-items: center;
            text-decoration: none;
            margin: 0;
            border: 0;
            font: inherit;
            vertical-align: baseline;
            box-sizing: border-box;
            color: #1d1655;
            text-align: left;
            height: 60px;
        }

            .loginTitle::before {
                content: "";
                position: absolute;
                top: 0;
                left: -15px;
                width: calc(100% + 15px);
                height: 80%;
                background: #fff;
                z-index: -1;
                -webkit-transform: skewX(-22.5deg);
                transform: skewX(-22.5deg);
            }

            color: transparent;
            width: 3rem;

            padding: 0;
            font: inherit;
            vertical-align: baseline;
            box-sizing: border-box;
        }

        .loginTitleText {
            color: #303584;
            display: flex;
            width: auto;
            border-left: 1px solid #b8c3cf;
            flex-direction: column;
            justify-content: center;
            text-transform: uppercase;
            overflow: hidden;
            height: 30px;
            margin: 0;
            padding: 0;
            font: inherit;
            vertical-align: baseline;
            box-sizing: border-box;
            text-align: left;
            padding-left: 10px;
            font-size: 13px;
            line-height: 16px;
        }

            .loginTitleText span {
                color: #f15a22;
            }

        #appName {
            color: #303584;
            font-family: benton-sans-condensed, sans-serif;
        }

        #tdAppName {
            font-size: 1.2rem;
            color: #303584;
            font-family: benton-sans-condensed, sans-serif;
        }

                padding-left: 1rem;
                padding-right: 2rem;
            }

                .loginTitle::before {
                    height: 100%;

            font-size: 0.875rem;
            font-weight: 400;

        .alert-timestamp {

            }

        .form-container {

                    right: 2.2rem;

                @media screen and (min-width: 1536px) {
                    right: 0.8rem;
                }

                justify-content: center;
                align-items: center;

            .password-rules {
                border-left: 0.0625rem solid #8f9296;

                    width: 24rem;

                    width: 21.5rem;

                    padding-top: 1.25rem;

                color: #2c2c2e;
                font-size: 1.125rem;
                margin-bottom: 1rem;
                font-weight: 400;
                line-height: 140%;

                height: 1.5rem;

                flex-direction: column;
                margin-top: 0.25rem;
                margin-left: 2rem;

                .sub-rule-item {
                    display: flex;
                    flex-wrap: nowrap;
                }
            }

            .attrEntry {
                margin-left: 0;

                @media screen and (min-width: 80rem) {
                    margin-left: 1.25rem;

                    margin-left: -2.1875rem;

            #attributeVerification {
                padding: 0;
                margin-right: 2rem;

                    margin-right: 0;

                    margin-left: 2.5rem;

                        margin-bottom: 1rem;

            #attributeList {
                width: 100%;

                    width: 21.5rem;

            ul {
                @media screen and (min-width: 96rem) {
                    padding: 0;

            input {
                width: 21.5rem;

            margin: 0;

                border: none;

            .country-select:focus,

            margin-bottom: 0.25rem;

        .labelDiv {
            min-width: 6.125rem;

        .error-message {
            display: flex;
            margin: 0;
            margin-top: 0.5rem;
            gap: 0.25rem;
            color: #7f0d03;
            font-size: 0.875rem;
            font-weight: 400;
            line-height: 140%;

        .error-showPassword {
            bottom: 3rem !important;
        }

        .verificationCode {
            margin-bottom: 2.5rem;
        }

        .verify-code-input-spacing {
            margin-bottom: clamp(1.5rem, 2.5vw, 1.875rem);
        }

        .verifyCode {
            width: 17.5rem;
            margin-bottom: 1rem;
        }

        .pwdResetBtnGroup.verify-code-layout .verifycodeBtn {

        .pwdResetBtnGroup.verify-code-layout .buttonWrapper {

        #emailVerificationControl_success_message,

        .working {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
            overflow: hidden !important;
        }

        .errorElement {
            .showPassword {
                bottom: 3rem;
            }
        }

        #email_ver_but_resend,
        #email_ver_but_verify,
        #passwordResetEmailVerificationControl_but_send_new_code,
        #passwordResetEmailVerificationControl_but_verify_code {
            opacity: 0;
        }

        .country-dropdown {
            position: relative;
            font-family: Inter;
        }

        .country-dropdown-toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: auto;
            padding: 0;
            color: #2c2c2e;
            gap: 0;

            &:hover,
            &:focus-visible {
                background-color: unset;
                color: unset;
            }
        }

        .country-dropdown-toggle {
            padding: 0.625rem;
            background: white;
            cursor: pointer;
        }

        .country-dropdown-options {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 0.0625rem solid #ccc;
            z-index: 1000;
            display: none;
            overflow-y: auto;
            width: max-content;
            font-size: 0.875rem;
            color: rgb(45, 45, 47);
            border-radius: 0.5rem;

            .country-dropdown-options.show {
                display: block;
            }

        .country-dropdown-option {
            padding: 0.625rem;
            cursor: pointer;
        }

            .country-dropdown-option:hover {
                background: #f0f0f0;
            }

        .signInButtonGroup {
            flex-direction: column;
            gap: 1rem;

            #continue {
                margin-right: 0;
            }
        }

        #continue, #next, #email_ver_but_send, #emailVerificationControl_but_send_code, #email_ver_but_verify, #emailVerificationControl_but_verify_code, #passwordResetEmailVerificationControl_but_send_code, #passwordResetEmailVerificationControl_but_verify_code {
            color: hsla(239,45%,40%,1) !important;
            background: #fff !important
        }

            #continue:hover, #next:hover, #email_ver_but_send:hover, #emailVerificationControl_but_send_code:hover, #email_ver_but_verify:hover, #emailVerificationControl_but_verify_code:hover, #passwordResetEmailVerificationControl_but_send_code:hover, #passwordResetEmailVerificationControl_but_verify_code:hover {
                background: hsla(239,45%,40%,1) !important;
                color: #fff !important
            }

        .padded-error-message {
            padding-left: 1rem;
            padding-right: 1rem;
        }
    </style>
