<html>
<head>
    <meta name="viewport"
          content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=yes" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="HandheldFriendly" content="true" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
          rel="stylesheet" />
    <link rel="icon" type="image/png" sizes="32x32" href="https://qahcplatformstorage.blob.core.windows.net/assets/inmar_logo.png">
    <style>
        :root {
            --aura-size-start: 0rem;
            --aura-size-mid: 75rem;
            --aura-size-end: 58.25rem;
        }

        @media screen and (min-width: 1280px) {
            :root {
                --aura-size-start: 0rem;
                --aura-size-mid: 94.125rem;
                --aura-size-end: 73.125rem;
            }
        }

        @media screen and (min-width: 1536px) {
            :root {
                --aura-size-start: 0rem;
                --aura-size-mid: 110.75rem;
                --aura-size-end: 86.125rem;
            }
        }

        * {
            font-feature-settings: "kern";
            font-kerning: normal;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html {
            height: 100%;

            * {
                box-sizing: border-box;
            }
        }

        body {
            font-family: Inter !important;
            background: #fefefe !important;
            margin: 0rem !important;
            height: 100vh;
            position: relative;
            overflow: hidden;

            * {
                font-family: Inter;
            }
        }

        footer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 1rem 4rem;

            @media screen and (min-width: 80rem) {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
        }

            footer a,
            footer p {
                margin: 0;
                font-size: 0.875rem;
                font-style: normal;
                font-weight: 400;
                line-height: 140%;
                color: #65666c;
                text-underline-offset: 1px;
            }

                footer a:hover,
                footer a:active {
                    color: #0005f8;
                }

                footer a:focus-visible {
                    outline: 2px solid #6f72ff;
                    outline-offset: 2px;
                    border-radius: 0.375rem;
                }

        .footer-left-container,
        .footer-right-container {
            display: flex;
            gap: 1.25rem;

            @media screen and (min-width: 768px) {
                gap: 2.5rem;
            }
        }

        .container {
            position: relative;
            width: 100%;
            height: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container.has-alert {
            justify-content: flex-start;
            padding-top: var(--alert-clearance, 0);
        }

            .container.has-alert .form-wrapper {
                margin-top: 1rem !important;
            }

        @keyframes auraAnimation {
            0% {
                width: var(--aura-size-start);
                height: var(--aura-size-start);
                border-radius: var(--aura-size-start);
            }

            70% {
                width: var(--aura-size-mid);
                height: var(--aura-size-mid);
                border-radius: var(--aura-size-mid);
                background: radial-gradient( 50% 50% at 50% 50%, rgba(254, 252, 255, 0.4) 0%, rgba(176, 177, 247, 0.4) 70%, rgba(254, 252, 255, 0.4) 100% );
            }

            100% {
                width: var(--aura-size-end);
                height: var(--aura-size-end);
                border-radius: var(--aura-size-end);
                background: radial-gradient( 50% 50% at 50% 50%, rgba(254, 252, 255, 0.4) 0%, rgba(176, 177, 247, 0.4) 70%, rgba(254, 252, 255, 0.4) 100% );
            }
        }

        .background-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .background-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            contain: strict;
            animation: auraAnimation 2s ease-in-out forwards;
            transition: all 2s ease-in-out;
        }

        .content-wrapper {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            position: absolute;
            top: 0;
            left: 0;
        }

        @keyframes slideUpAnimation {
            0% {
                opacity: 0;
                transform: translate(0, 20%);
            }

            70% {
                opacity: 0;
                transform: translate(0, 10%);
            }

            100% {
                opacity: 1;
                transform: translate(0, 0);
            }
        }

        .form-wrapper {
            margin-top: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 21.5rem;
            opacity: 0;
            animation: slideUpAnimation 2.5s ease-in-out forwards;

            @media screen and (min-width: 1280px) {
                width: 20.5rem;
            }

            @media screen and (min-width: 1536px) {
                width: 24rem;
            }
        }

        .logo,
        #dividedLogo {
            width: 2rem;
            height: 2rem;
            margin-bottom: 1.5rem;
        }

        #api {
            width: 100%;
        }

        .description {
            color: #65666c;
            text-align: center;
            font-size: 0.875rem;
            font-style: normal;
            font-weight: 400;
            line-height: 140%;
            margin: 0.5rem 0 2.5rem 0;
        }

        .entry {
            display: flex;
            flex-direction: column;
        }

        .entry-item {
            position: relative;
            margin-bottom: 2.5rem;
        }

        .showPassword {
            background-color: transparent;
            padding: 0;
            position: absolute;
            right: 1rem;
            bottom: 1.3rem;
            margin: 0;
            width: 1.5rem;
            height: 1.5rem;

            &:hover,
            &:focus-visible {
                background-color: transparent;
            }
        }

        label {
            color: #2c2c2e;
            font-size: 1rem;
            font-style: normal;
            font-weight: 400;
            line-height: 115%;
        }

        input {
            width: 100%;
            display: flex;
            min-height: 4rem;
            padding: 0.875rem 1rem;
            align-items: center;
            gap: 0.625rem;
            align-self: stretch;
            border-radius: 0.5rem;
            border: 1px solid #8f9296;
            background: #fff;
            margin-top: 0.5rem;
            color: #2c2c2e;
            font-size: 1rem;
            font-weight: 400;
            line-height: 140%;
        }

            input:disabled {
                border-radius: 0.5rem;
                border: 1px solid #ecebe4;
                background: #f8f8f8;
            }

            input:focus-visible {
                outline: none;
                border: 1px solid #0004cb;
            }

        button {
            display: flex;
            width: 13.625rem;
            padding: 0.75rem 1rem;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            border-radius: 0.5rem;
            background: #fff;
            color: #0005f8;
            font-size: 1rem;
            font-weight: 600;
            line-height: 150%;
            letter-spacing: -0.01rem;
            border: none;
            cursor: pointer;

            @media screen and (min-width: 1280px) {
                width: 14.875rem;
            }

            @media screen and (min-width: 1536px) {
                width: 17.5rem;
            }

            &:hover {
                opacity: 1;
                background-color: hsla(239, 45%, 40%, 1);
                color: white;
            }

            &:focus-visible {
                background-color: #0005f8;
                color: white;
                outline: 2px solid #6f72ff;
                outline-offset: 1px;
            }
        }

        #next {
            justify-self: center;
        }

        .text-link-group,
        .linkContainer {
            width: 100%;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
            margin-top: 1rem;
        }

            .text-link-group a,
            .resend-code-btn,
            .backToSignInLink {
                padding-block: 0.375rem;
                color: #2c2c2e;
                text-align: center;
                font-size: 0.875rem;
                font-weight: 600;
                line-height: 150%;
                letter-spacing: -0.00875rem;
                text-decoration: none;
                opacity: 1 !important;

                &:hover {
                    text-decoration: underline;
                    text-decoration-color: #0005f8;
                    text-decoration-thickness: 2px;
                    text-underline-offset: 2px;
                }

                &:focus-visible {
                    border-radius: 0.5rem;
                    outline: 2px solid #6f72ff;
                }

                &:active {
                    color: #0005f8;
                }
            }

        .btn {
            background: #fff;
            padding: 5px;
            width: 150px;
            height: 35px;
            border: 1px solid #ff4081;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 50px #ff4081 inset;
            color: #fff;
        }

            .btn:hover {
                box-shadow: 0 0 #ff4081 inset;
                color: #ff4081;
            }

            .btn:focus {
                outline: none;
            }

        .attrEntry {
            position: relative;
            margin-left: -40px;
        }

        li {
            list-style: none;
        }

        #continue:disabled {
            opacity: 0.5;
        }

            #continue:disabled:hover {
                cursor: not-allowed;
                opacity: 0.5;
            }

        #continue {
            margin-right: 55px;
        }

        #cancel {
            border-radius: 0.5rem;
            border: 1px solid #0005f8;
            background-color: transparent;
            color: #161bff;

            &:focus-visible,
            &:hover {
                outline: 2px solid #6f72ff;
                outline-offset: 0;
            }
        }

        .helpLink {
            display: none;
        }

        .tdDivider {
            padding-left: 20px;
            border-left: 3px solid gray;
        }

        .intro {
            color: #2c2c2e;
            text-align: center;
        }

        h2, .heading-xl {
            font-size: 2.5rem;
            font-style: normal;
            font-weight: 300;
            line-height: 115%;
            letter-spacing: -0.02em;
            color: #2d2d2f;
            margin: 0;
        }

        #fieldIncorrect {
            display: none !important;
        }

        .error {
            color: #7f0d03;
            font-size: 14px;
            font-weight: 400;
            line-height: 140%;
        }

        #emailVerificationControl_but_change_claims,
        #passwordResetEmailVerificationControl_but_change_claims {
            display: none !important;
        }

        #emailVerificationControl input#email,
        #passwordResetEmailVerificationControl input#email {
            pointer-events: none;
            border-radius: 0.5rem;
            border: 0.0625rem solid #cfd5d4;
            background: #f8f8f8;
            cursor: not-allowed;
            opacity: 0.7;
            margin-bottom: 2.5rem;
        }

        #emailVerificationControl_but_send_code,
        #passwordResetEmailVerificationControl_but_send_code {
            width: 17.5rem;
            margin-bottom: 1rem;
        }

        .migrationAdditionalInfo {
            margin-block: 0.5rem 2.5rem !important;
        }

        #verifying_blurb {
            display: none;
        }

        .loginTitle {
            background-color: transparent;
            display: flex;
            padding-left: 0.5rem;
            padding-right: 1rem;
            position: relative;
            align-items: center;
            text-decoration: none;
            margin: 0;
            border: 0;
            font: inherit;
            vertical-align: baseline;
            box-sizing: border-box;
            color: #1d1655;
            text-align: left;
            height: 60px;
        }

            .loginTitle::before {
                content: "";
                position: absolute;
                top: 0;
                left: -15px;
                width: calc(100% + 15px);
                height: 80%;
                background: #fff;
                z-index: -1;
                -webkit-transform: skewX(-22.5deg);
                transform: skewX(-22.5deg);
            }

            color: transparent;

            padding: 0;
            font: inherit;
            vertical-align: baseline;
            box-sizing: border-box;
        }

        .loginTitleText {
            color: #303584;
            display: flex;
            width: auto;
            border-left: 1px solid #b8c3cf;
            flex-direction: column;
            justify-content: center;
            text-transform: uppercase;
            overflow: hidden;
            height: 30px;
            margin: 0;
            padding: 0;
            font: inherit;
            vertical-align: baseline;
            box-sizing: border-box;
            text-align: left;
            padding-left: 10px;
            font-size: 13px;
            line-height: 16px;
        }

            .loginTitleText span {
                color: #f15a22;
            }

        #appName {
            color: #303584;
            font-family: benton-sans-condensed, sans-serif;
        }

        #tdAppName {
            font-size: 1.2rem;
            color: #303584;
            font-family: benton-sans-condensed, sans-serif;
        }

            .loginTitle {
                padding-left: 1rem;
                padding-right: 2rem;

                    height: 100%;

    <script type="text/javascript">
      $(document).ready(function () {
        console.log("Inside Document ready.");
        setTimeout(() => {
          document.title = "Login | InmarOne";
          document.getElementById("year").innerHTML = new Date().getFullYear();
          if (document.getElementById("email_label")) {
            document.getElementById("email_label").innerHTML = "";
          }
          if (document.querySelector("label[for=signInName]")) {
            document.querySelector("label[for=signInName]").textContent =
              "Email Address";
          }
          if (document.querySelector("label[for=email]")) {
            document.querySelector("label[for=email]").textContent = "";
          }

          //Update header text and add description under header
          const passwordStepHeader =
            document.querySelector('h2[aria-level="1"]');
          if (passwordStepHeader) {
            passwordStepHeader.textContent = "Enter your password";
            passwordStepHeader.classList.add("heading-xl");
            const description = document.createElement("p");
            description.textContent =
              "Enter your password to securely access insights and healthcare tools.";
            description.classList.add("description");

            passwordStepHeader.insertAdjacentElement("afterend", description);
          }

          if (document.getElementById("email")) {
            document
              .getElementById("email")
              .setAttribute("placeholder", "Email");
          }
          if (document.getElementById("signInName")) {
            document
              .getElementById("signInName")
              .setAttribute("placeholder", "Email/UserName");
            var uName = document.getElementById("signInName").value;
            setCookie("login_hint", uName, 5);
            if (uName != "" && !uName.includes("@")) {
              if (document.getElementById("forgotPassword")) {
                var link = document.getElementById("forgotPassword");
                link.setAttribute("href", "#");
                link.setAttribute("onclick", "displayMsg()");
              }
            }
          }
          if (document.getElementById("errorMessage")) {
            console.log("Inside User disabled error.");
            const disabledUserMsg = document
              .getElementById("errorMessage")
              .getAttribute("aria-label");

            if (disabledUserMsg && disabledUserMsg !== "") {
              // Clear intro paragraph for all error types
              $(".intro > p").html("");

              const errorMessage = document.getElementById("errorMessage");

              if (disabledUserMsg.includes("disabled") || disabledUserMsg.includes("enable your account")) {
                errorMessage.classList.add("errorRedLabel");
              } else if (disabledUserMsg.includes("IsIdPFederatedUser_Message")) {
                // Handle Federated User Error Message
                const heading = document.createElement("h2");
                heading.className = "heading-xl";
                heading.textContent = "Sign in via Your Company's Portal";

                const intro = document.querySelector(".intro");
                if (intro) {
                  intro.appendChild(heading);
                }

                errorMessage.textContent = 'Your organization uses its own login system. To continue, sign in through your company\'s portal, then return to InmarOne.';
                errorMessage.classList.remove("textInParagraph");
                errorMessage.classList.add("description", "padded-error-message");
              }
            }
          }

          //Add show/hide password icon buttons by passing ids
          addShowPasswordToggle("password");
          addShowPasswordToggle("newPassword");
          addShowPasswordToggle("reenterPassword");

          //Disable email input fiels for password screen
          const signInNameInput = document.querySelector(".entry #signInName");
          if (signInNameInput) {
            signInNameInput.setAttribute("disabled", "disabled");
          }

          //Update Sign in button text to "Continue"
          const signInButton = document.getElementById("next");
          if (signInButton) {
            signInButton.textContent = "Continue";
            signInButton.onclick = () => {
              let count = 0;
              const interval = setInterval(() => {
                count++;

                if (count >= 4) {
                  clearInterval(interval);
                }
              }, 500);
            };
          }

          const forgotPassword = document.getElementById("forgotPassword");
          const forgotPasswordLink =
            document.getElementById("forgotPasswordLink");
          const switchAccountLink =
            document.getElementById("switchAccountLink");

          if (forgotPassword) {
            //Update the forgot password link at its new position
            if (forgotPasswordLink) {
              forgotPasswordLink.classList.remove("clsHidden");
              const linkAddress =
                document.getElementById("forgotPassword")?.href ?? "/";
              forgotPasswordLink.href = linkAddress;
            }

            if (switchAccountLink) {
              switchAccountLink.classList.remove("clsHidden");
              switchAccountLink.addEventListener("click", (e) => {
                e.preventDefault();
                window.history.back();
                return false;
              });
            }
          } else {
            forgotPasswordLink.classList.add("clsHidden");
            switchAccountLink.classList.add("clsHidden");
          }
          setupAlertLayout();
          updateFirstSignInPage();
          setButtonDefaultLogic();
          updatePasswordResetStyles();
          updateCreatePasswordStyles();
          changeMigrationContinueBtnStatus(true);
          setInterval(checkVerificationStatus, 1000);
          updateScanScreenStyles();
          updateAuthenticationStyles();
          updateMigrationStyles();
          updateVerificationScreen();
          updatePhoneNumberAuthentication();
          updateSetPasswordStyles();

          // Rules for field validation using ids
          const fieldConfigs = [
            {
              ids: ["signInName", "email"],
              validate: (value) => {
                const emailRegex =
                  /^[a-zA-Z0-9.!#%&'+^_`{}~-]+@[a-zA-Z0-9-]+(?:\.[a-zA-Z0-9-]+)+$/;
                return (
                  value.length >= 4 &&
                  value.length <= 100 &&
                  emailRegex.test(value)
                );
              },
              errorText: "Enter a valid email address (4–100 characters).",
              errorClass: ["email-error-message"],
            },
            {
              ids: ["password", "confirmPassword"],
              validate: (value) => value.length >= 8 && value.length <= 16,
              errorText: "Password must be 8–16 characters long.",
              errorClass: ["password-error-message"],
            },
            {
              ids: ["email_ver_input", "passwordResetEmailVerificationControl_verificationCode"],
              validate: (value) => /^\d{6}$/.test(value),
              errorText: "Enter a valid 6-digit verification code.",
              errorClass: ["email-error-message"],
            },
          ];

          /** Setup validation for each field group */
          fieldConfigs.forEach(({ ids, validate, errorText, errorClass }) => {
            ids.forEach((id) => {
              const input = document.getElementById(id);
              if (!input) return;

              const errorMsg = createErrorMessage(errorText, errorClass);
              appendErrors(input, [errorMsg]);

              let touched = false;

              input.addEventListener("blur", () => {
                const trimmed = input.value.trim();
                if (!trimmed) {
                  touched = false;
                  toggleError(errorMsg, false);
                  updateBorderColor(input, false);
                  return;
                }

                touched = true;
                toggleError(errorMsg, !validate(trimmed));
                updateBorderColor(input, !validate(trimmed));
              });

              input.addEventListener("input", () => {
                const trimmed = input.value.trim();
                if (!trimmed) {
                  touched = false;
                  toggleError(errorMsg, false);
                  updateBorderColor(input, false);
                  return;
                }

                toggleError(errorMsg, touched && !validate(trimmed));
                updateBorderColor(input, touched && !validate(trimmed));
              });
            });
          });

          handleFederatedUserMessage();
        });
        var appName = getAppParameterFromUrl("AppName");
        if (appName != null) {
          console.log("AppName found in URL : " + appName);
          setTimeout(() => {
            document.getElementById("appName").innerHTML =
              getAppNameInnerHTML(appName);
            document.getElementById("tdAppName").classList.add("tdDivider");
            setCookie("appName", appName);
            console.log("AppName set from URL : " + appName);
          });
        } else {
          appName = getCookie("appName");
          if (appName && !isNewAppLogin()) {
            console.log("AppName found in cookie : " + appName);
            setTimeout(() => {
              document.getElementById("appName").innerHTML =
                getAppNameInnerHTML(appName);
              document.getElementById("tdAppName").classList.add("tdDivider");
            });
            console.log("AppName set from cookie : " + appName);
          } else {
            setTimeout(() => {
              document.getElementById("tdAppName").style = "helpLink";
              setCookie("appName", "", 0);
            });
          }
        }

        if (appName == null || appName.trim() == "") {
          console.log("Inside dynamic logo. Appname " + appName);
          setTimeout(() => {
            document.getElementById("centerHeaderImg").classList.add("clsShow");
            document
              .getElementById("headerImgTable")
              .classList.add("clsHidden");
          });
        } else {
          console.log(
            "Inside dynamic logo, appname not null. Appname :" + appName
          );
          setTimeout(() => {
            document.getElementById("headerImgTable").classList.add("clsShow");
            document
              .getElementById("centerHeaderImg")
              .classList.add("clsHidden");
          });
        }
      });

      // Handle federated user message replacement and intro hiding
      function handleFederatedUserMessage() {
            // Look for the paragraph with id="errorMessage"
            var errorMsg = document.getElementById('errorMessage');
            if (!errorMsg) return;

            // Get the message from aria-label or text content
            var errorText = (errorMsg.getAttribute('aria-label') || errorMsg.textContent || '').trim();
            if (!errorText) return;

            // Check if this is the federated user placeholder
            if (errorText === 'IsIdPFederatedUser_Message') {
                // Replace the placeholder with the actual message
                var actualMessage = 'Your organization uses its own login system. To continue, sign in through your company\'s portal, then return to InmarOne.';
                errorMsg.textContent = actualMessage;
                if (errorMsg.hasAttribute('aria-label')) {
                    errorMsg.setAttribute('aria-label', actualMessage);
                }

                // Hide the intro div
                var container = document.getElementById('container');
                if (container) {
                    container.classList.add('hide-intro-for-federated');
                }
                console.log('Federated user message displayed and intro hidden');
            }
      }

      function setupAlertLayout() {
        const alertBox = document.getElementById("alertBox");
        const container = document.querySelector(".container");
        if (!alertBox || !container) return;

        const syncAlertLayout = () => {
          const isVisible = window.getComputedStyle(alertBox).display !== "none";
          container.classList.toggle("has-alert", isVisible);

          if (!isVisible) {
            document.documentElement.style.removeProperty("--alert-clearance");
            return;
          }

          const clearance = alertBox.offsetTop + alertBox.offsetHeight;
          document.documentElement.style.setProperty("--alert-clearance", `${clearance}px`);
        };

        const observer = new MutationObserver(() => {
          window.requestAnimationFrame(syncAlertLayout);
        });

        observer.observe(alertBox, {
          attributes: true,
          attributeFilter: ["style", "class"],
        });

        window.addEventListener("resize", syncAlertLayout);
        window.requestAnimationFrame(syncAlertLayout);
      }

      //Function to show password view/hide toggle button
      function addShowPasswordToggle(inputId) {
        const input = document.getElementById(inputId);
        if (!input) return;

        // Check if a toggle button already exists for this input
        if (document.querySelector(`.showPassword-${inputId}`)) return;

        // Create the toggle button element
        const toggleButton = document.createElement("button");
        toggleButton.type = "button"; // Prevent form submission
        toggleButton.classList.add("showPassword", `showPassword-${inputId}`);
        toggleButton.setAttribute("aria-label", "show password");

        // Define SVG icons for "eye open" (show password)

      /**
       * Returns the current date and time formatted in a user-friendly string.
       *
       * Format example: "Jun 23, 2025 | 01:45 PM"
       *
       * - Uses 'en-US' locale for formatting.
       * - Date format: short month, 2-digit day, full year.
       * - Time format: 2-digit hour and minute in 12-hour format with AM/PM.
       */
      function formatDate() {
        const now = new Date();
        const options = { month: "short", day: "2-digit", year: "numeric" };
        const formattedDate = now.toLocaleDateString("en-US", options);
        const formattedTime = now.toLocaleTimeString("en-US", {
          hour: "2-digit",
          minute: "2-digit",
          hour12: true,
        });

        return `${formattedDate} | ${formattedTime}`;
      }

      function setButtonDefaultLogic() {
        var email_ver_but_send = document.getElementById("email_ver_but_send") || document.getElementById("passwordResetEmailVerificationControl_but_send_code");
        var email_ver_but_verify = document.getElementById("email_ver_but_verify") || document.getElementById("passwordResetEmailVerificationControl_but_verify_code");
        var continueButton = document.getElementById("continue");

        if (
          email_ver_but_send &&
          email_ver_but_send.style.display !== "none"
        ) {
          if (continueButton) continueButton.style.display = "none";
        }

        if (email_ver_but_send) {
          document.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
              event.preventDefault();
              if (email_ver_but_send.style.display !== "none") {
                email_ver_but_send.click();
                setTimeout(() => {
                  updateVerifyCodePasswordStyles();
                }, 500);
                return;
              }

              if (email_ver_but_verify && email_ver_but_verify.style.display !== "none") {
                email_ver_but_verify.click();
                return;
              }

              if (continueButton) continueButton.click();
            }
          });

          email_ver_but_send.addEventListener("click", function (event) {
            const observeNavBtn = document.getElementById("email_ver_but_verify") || document.getElementById("passwordResetEmailVerificationControl_but_verify_code");

            if (observeNavBtn) {
              const observer = new MutationObserver(() => {
                // Check the visibility condition
                const isVisible = observeNavBtn.style.display !== "none";
                if (isVisible) {
                  updateVerifyCodePasswordStyles();
                  observer.disconnect(); // Stop watching once triggered
                }
              });

              // Observe for style attribute changes
              observer.observe(observeNavBtn, {
                attributes: true,
                attributeFilter: ["style"], // Only observe style changes
              });
            }
          });
        }

        const targetElement = document.getElementById("email_success") || document.getElementById("passwordResetEmailVerificationControl_success_message");

        if (targetElement) {
          const continueBtn = document.getElementById("continue");

          const observer = new MutationObserver((mutationsList) => {
            mutationsList.forEach((mutation) => {
              if (
                mutation.attributeName === "style" &&
                targetElement.style.display !== "none"
              ) {
                const text = targetElement.textContent.toLowerCase();
                if (text.includes("verified")) {
                  targetElement.style.display = "none";
                  if (continueBtn && continueBtn.disabled) {
                    continueBtn.disabled = false;
                  }
                  if (continueBtn) continueBtn.click();
                } else {
                  targetElement.style.display = "none";
                }
              }
            });
          });

          observer.observe(targetElement, {
            attributes: true,
            attributeFilter: ["style"],
          });
        }
      }

      function isNewAppLogin() {
        var url = window.location.href;
        if (
          url.toLowerCase().includes("signup_signin") &&
          url.toLowerCase().includes("authorize")
        )
          return true;
        else return false;

      function getAppParameterFromUrl(name) {
        var url = window.location.href;
        var regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)"),
          results = regex.exec(url);
        if (!results) return null;
        if (!results[2]) return "";
        var appName = decodeURIComponent(results[2].replace(/\+/g, " "));
        return appName;
      }

      function setCookie(cookieName, cookieValue, expiryMins = 30) {
        var d = new Date();
        d.setTime(d.getTime() + expiryMins * 60 * 1000);
        var expires = "expires=" + d.toUTCString();
        document.cookie =
          cookieName + "=" + btoa(cookieValue) + ";" + expires + ";path=/";
      }

      function getCookie(cookieName) {
        var name = cookieName + "=";
        var decodedCookie = decodeURIComponent(document.cookie);
        var ca = decodedCookie.split(";");
        for (let i = 0; i < ca.length; i++) {
          var c = ca[i];
          while (c.charAt(0) == " ") {
            c = c.substring(1);
          }
          if (c.indexOf(name) == 0) {
            return atob(c.substring(name.length, c.length));
          }
        }
        return "";
      }

      // change your password along with password validation
      function updateCreatePasswordStyles() {
        const MAX_LENGTH = 16;
        const confirmPwdInput = document.getElementById("reenterPassword");
        const pwdInput = document.getElementById("newPassword");

        const form = document.getElementById("attributeVerification");

        if (!confirmPwdInput || !pwdInput || !form) return;

        pwdInput.setAttribute("maxlength", MAX_LENGTH.toString());
        confirmPwdInput.setAttribute("maxlength", MAX_LENGTH.toString());

        // Trim pasted values
        const trimOnPaste = (input) => {
          input.addEventListener("paste", (e) => {
            e.preventDefault();
            const pasted = (e.clipboardData || window.clipboardData).getData(
              "text"
            );
            const trimmed = pasted.trim().slice(0, MAX_LENGTH);
            const selectionStart = input.selectionStart ?? 0;
            const selectionEnd = input.selectionEnd ?? 0;

            const before = input.value.slice(0, selectionStart);
            const after = input.value.slice(selectionEnd);

            const newValue = (before + trimmed + after).slice(0, MAX_LENGTH);
            input.value = newValue;

            input.dispatchEvent(new Event("input", { bubbles: true }));
          });
        };

        trimOnPaste(pwdInput);
        trimOnPaste(confirmPwdInput);

        setupPageLayout();
        setupLabelsAndPlaceholders();
        const backToSignIn = document.getElementById("cancel");
        if (backToSignIn) {
          backToSignIn.classList.add("backToSignInLink");
        }

        const errors = createAndAppendErrors(pwdInput, confirmPwdInput);
        setupPasswordValidation(pwdInput, confirmPwdInput, errors);
      }

      // Call validatation function on the "new password" and "re-enter password" fields
      function setupPasswordValidation(pwdInput, confirmPwdInput, errors) {
        const validate = () =>
          validatePasswords(pwdInput, confirmPwdInput, errors);
        pwdInput.addEventListener("blur", validate);
        confirmPwdInput.addEventListener("blur", validate);
        validate();
      }

      // Validate passwords and toggle errors accordingly
      function validatePasswords(pwdInput, confirmPwdInput, errors) {
        const pwdValue = pwdInput.value.trim();
        const confirmPwdValue = confirmPwdInput.value.trim();
        const isPwdValid = checkPasswordRules(pwdValue);
        const isConfirmPwdValid = checkPasswordRules(confirmPwdValue);
        const isMatch = pwdValue === confirmPwdValue;
        toggleError(errors.pwdRules, !isPwdValid && pwdValue);
        toggleError(errors.confirmPwdRules, !isPwdValid && confirmPwdValue);
        toggleError(
          errors.confirmPwdMismatch,
          isPwdValid && confirmPwdValue && !isMatch
        );

        updateBorderColor(pwdInput, !isPwdValid && pwdValue);
        updateBorderColor(
          confirmPwdInput,
          (!isPwdValid && confirmPwdValue) ||
            (isPwdValid && confirmPwdValue && !isMatch)
        );
        updateShowPasswordButton(
          ".showPassword-newPassword",
          pwdValue,
          isPwdValid
        );
        updateShowPasswordButton(
          ".showPassword-reenterPassword",
          confirmPwdValue,
          isConfirmPwdValid
        );
        const passwordError = document.getElementById("password-error-message");
        if (passwordError) passwordError.style.display = "none";
      }

      /** Creates and appends password rules */
      function createPasswordRules(pwdInput) {
        const rulesContainer = createElement("div", ["password-rules"]);
        rulesContainer.appendChild(
          createElement(
            "h2",
            ["passwordRulesHeader"],
            "Your password must contain:"
          )
        );

        const rules = [
          { text: "At least 8 characters in length", regex: /.{8,}/ },
          {
            text: "A maximum of 16 characters in length",
            regex: /^.{1,16}$/,
          },
          {
            text: "At least 3 of the following:",
            subRules: [
              { text: "Lowercase letter (a-z)", regex: /[a-z]/ },
              { text: "Uppercase letter (A-Z)", regex: /[A-Z]/ },
              { text: "Digits (0-9)", regex: /\d/ },
              {
                text: "One or more of the following symbols: @ # $ % ^ & * - _ + = [ ] { } | \\ : ' , ? / ` ~ \" ( ) ; . ",
                regex: /[@#$%^&*_\-+=[\]{}|\\:'",?/`~();.]/,
              },
            ],
          },
        ];
        rules.forEach((rule) =>
          rulesContainer.appendChild(createRuleItem(rule, pwdInput))
        );
        return rulesContainer;
      }

      //Check the new password rules and subrules
      function checkPasswordRules(password) {
        const mainRules = [/.{8,}/, /^.{8,16}$/];

        const subRules = [
          /[a-z]/,
          /[A-Z]/,
          /\d/,
          /[@#$%^&*_\-+=[\]{}|\\:'",?/`~();.]/,
        ];

        // Check if both main rules are satisfied
        const mainRulesPassed = mainRules.every((rule) => rule.test(password));

        // Count how many sub-rules are satisfied
        const subRulesPassedCount = subRules.filter((rule) =>
          rule.test(password)
        ).length;

        // Password is valid if both main rules are passed and at least 3 sub-rules are satisfied
        return mainRulesPassed && subRulesPassedCount >= 3;
      }

      /** Creates a single rule item */
      function createRuleItem(rule, pwdInput) {
        const ruleItem = createElement("div", ["rule-item"]);
        const icon = createElement(
          "span",
          ["rule-icon"],
          getNotSatisfiedIcon()
        );
        const ruleText = createElement("span", [], rule.text);
        ruleItem.append(icon, ruleText);
        if (rule.subRules) {
          const subRulesContainer = createElement("div", ["sub-rules"]);
          const subIcons = [];
          rule.subRules.forEach((subRule) => {
            const subRuleItem = createElement("div", ["sub-rule-item"]);
            const subIcon = createElement(
              "span",
              ["rule-icon"],
              getNotSatisfiedIcon()
            );
            const subRuleText = createElement("span", [], subRule.text);
            subIcons.push({ subIcon, subRule });
            subRuleItem.append(subIcon, subRuleText);
            subRulesContainer.appendChild(subRuleItem);
          });
          ruleItem.appendChild(subRulesContainer);
          pwdInput.addEventListener("input", () => {
            let satisfiedCount = 0;

            subIcons.forEach(({ subIcon, subRule }) => {
              if (subRule.regex.test(pwdInput.value)) {
                subIcon.innerHTML = getCheckIcon();
                satisfiedCount++;
              } else {
                subIcon.innerHTML = getNotSatisfiedIcon();
              }
            });
            icon.innerHTML =
              satisfiedCount >= 3 ? getCheckIcon() : getNotSatisfiedIcon();
          });
        } else {
          pwdInput.addEventListener("input", () => {
            icon.innerHTML = rule.regex.test(pwdInput.value)
              ? getCheckIcon()
              : getNotSatisfiedIcon();
          });
        }
        return ruleItem;
      }

        const description = document.querySelector(".authenticatorDescription");
        description.textContent =
          "Verification code has been sent via SMS to authenticate you. Please enter it to the input box below.";
        const actionLabel = document.querySelector(".actionLabel");
        actionLabel.style.display = "none";
        const input = document.getElementById("verificationCode");

        const label = document.createElement("label");
        label.setAttribute("for", "verificationCode");
        label.textContent = "Verification Code";

        input.parentNode.insertBefore(label, input);
        const numberDiv = document.querySelector(".phoneNumber .number");
        const phoneField = document.querySelector(".phone-input-wrapper");
        phoneField.style.display = "none";
        if (numberDiv) {
          const input = document.createElement("input");
          input.type = "text";
          input.id = "phoneNumberInput";
          input.value = numberDiv.textContent.trim();
          input.disabled = true;

          numberDiv.parentNode.replaceChild(input, numberDiv);
          const label = document.createElement("label");
          label.setAttribute("for", "phoneNumberInput");
          label.textContent = "Phone Number";

          input.parentNode.insertBefore(label, input);
        }

        const verifyCode = document.getElementById("verifyCode");
        verifyCode.textContent = "Continue";
        const callBtn = document.querySelector(".callBtn");
        callBtn.style.display = "none";
      }

      function setupPhoneInput() {
        const phoneEntry = document.getElementById("phoneEntry");
        if (!phoneEntry) return;

        // Hide default input
        const phone = document.querySelector(".input");
        if (phone) phone.style.display = "none";

        // Create wrapper
        const wrapper = document.createElement("div");
        wrapper.classList.add("phone-input-wrapper");

        // Create select wrapper
        const selectWrapper = document.createElement("div");
        selectWrapper.classList.add("select-wrapper");

        let selectedCode = null;

        // Supported countries
        const countries = [
          { code: "+1", name: "United States (+1)" },
          { code: "+1", name: "Canada (+1)" },
          { code: "+52", name: "Mexico (+52)" },
        ];

        // Create custom country dropdown
        const select = document.createElement("div");
        select.classList.add("country-dropdown");

        // Create dropdown label and icon container
        const toggleContainer = document.createElement("button");
        toggleContainer.classList.add("country-dropdown-toggle-container");
        select.appendChild(toggleContainer);

        // Create label for short country code text
        const toggle = document.createElement("div");
        toggle.classList.add("country-dropdown-toggle");
        toggle.textContent = countries[0].code;
        toggleContainer.appendChild(toggle);

        // Add chevron icon
        const chevron = document.createElement("span");
        chevron.classList.add("chevron-icon");
        chevron.innerHTML = chevronDown;
        toggleContainer.appendChild(chevron);

        // Create options
        const optionsContainer = document.createElement("div");
        optionsContainer.classList.add("country-dropdown-options");
        select.appendChild(optionsContainer);

        countries.forEach((country) => {
          const option = document.createElement("div");
          option.classList.add("country-dropdown-option");
          option.dataset.code = country.code;
          option.dataset.fullLabel = country.name;
          option.textContent = country.name;
          optionsContainer.appendChild(option);

          option.addEventListener("click", () => {
            selectedCode = country.code;
            toggle.textContent = country.code;
            optionsContainer.classList.remove("show");

            const countryCodeSelect = document.getElementById("countryCode");
            if (countryCodeSelect) {
              Array.from(countryCodeSelect.options).forEach((countryOption) => {
                if (countryOption.textContent.trim() === option.textContent) {
                  countryOption.setAttribute("selected", true);
                } else {
                  countryOption.removeAttribute("selected");
                }
              });
            }
          });
        });

        // When dropdown is about to open
        toggleContainer.addEventListener("click", () => {
          optionsContainer.classList.toggle("show");
        });

        // Close dropdown when clicking outside
        document.addEventListener("click", (e) => {
          if (!select.contains(e.target)) {
            optionsContainer.classList.remove("show");
          }
        });

        // Create input field
        const input = document.createElement("input");
        input.type = "tel";
        input.classList.add("phone-number-input");
        input.id = "phone-number";

        // Assemble elements
        selectWrapper.appendChild(select);
        wrapper.appendChild(selectWrapper);
        wrapper.appendChild(input);
        phoneEntry.appendChild(wrapper);

        // Sync with hidden number input
        const numberInput = document.getElementById("number");
        if (numberInput) {
          input.addEventListener("input", () => {
            numberInput.value = input.value;
          });
        }
      }
      const chevronDown = `<svg
                                        width="16"
                                        height="17"
                                        viewBox="0 0 16 17"
                                        fill="none"
                                        xmlns="http://www.w3.org/2000/svg"
                                      >
                                        <path
                                          d="M7.70573 11.2943C7.86719 11.4557 8.13281 11.4557 8.29427 11.2943L12.4609 7.1276C12.6224 6.96615 12.6224 6.70052 12.4609 6.53906C12.2995 6.3776 12.0339 6.3776 11.8724 6.53906L8 10.4115L4.1276 6.53906C3.96615 6.3776 3.70052 6.3776 3.53906 6.53906C3.3776 6.70052 3.3776 6.96615 3.53906 7.1276L7.70573 11.2943Z"
                                          fill="#2C2C2E"
                                        />
                                      </svg>`;
    </script>
</head>
